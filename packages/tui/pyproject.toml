[project]
name = "pi-tui"
version = "0.0.0"
description = "Terminal UI primitives — Python port of @mariozechner/pi-tui (Textual-backed)"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "textual>=0.85.0",
    "rich>=13.9.0",
    "markdown-it-py>=3.0.0",
    "pillow>=11.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_tui"]
