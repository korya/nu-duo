[project]
name = "pi-pods"
version = "0.0.0"
description = "vLLM pod manager — Python port of @mariozechner/pi-pods"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "pi-agent-core",
    "asyncssh>=2.18.0",
    "typer>=0.15.0",
    "pydantic>=2.10.0",
    "rich>=13.9.0",
]

[project.scripts]
pi-pods = "pi_pods.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_pods"]
