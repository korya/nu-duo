[project]
name = "nu-mom"
version = "0.0.0"
description = "Slack bot delegating to pi agent — Python port of @mariozechner/pi-mom"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "nu-ai",
    "nu-agent-core",
    "nu-coding-agent",
    "slack-bolt>=1.21.0",
    "slack-sdk>=3.33.0",
    "docker>=7.1.0",
    "croniter>=3.0.0",
    "pydantic>=2.10.0",
]

[project.scripts]
nu-mom = "nu_mom.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nu_mom"]
