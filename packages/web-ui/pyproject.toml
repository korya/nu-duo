[project]
name = "pi-web-ui"
version = "0.0.0"
description = "Pi web UI — FastAPI backend + vendored TS/Lit frontend. Python port of @mariozechner/pi-web-ui."
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "pi-ai",
    "pi-agent-core",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "aiosqlite>=0.20.0",
    "pydantic>=2.10.0",
    "httpx>=0.28.0",
    "python-multipart>=0.0.17",
    "websockets>=13.1",
]

[project.scripts]
pi-web-ui = "pi_web_ui.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_web_ui"]
