[project]
name = "pi-agent-core"
version = "0.0.0"
description = "Stateful agent loop and tool execution — Python port of @mariozechner/pi-agent-core"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "pi-ai",
    "pydantic>=2.10.0",
    "anyio>=4.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_agent_core"]
