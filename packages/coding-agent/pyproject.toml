[project]
name = "pi-coding-agent"
version = "0.0.0"
description = "Pi coding agent CLI — Python port of @mariozechner/pi-coding-agent"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "pi-ai",
    "pi-agent-core",
    "pi-tui",
    "pydantic>=2.10.0",
    "typer>=0.15.0",
    "pathspec>=0.12.0",
    "python-frontmatter>=1.1.0",
    "pyyaml>=6.0.2",
    "tiktoken>=0.8.0",
    "pillow>=11.0.0",
    "filelock>=3.16.0",
    "chardet>=5.2.0",
    "pyperclip>=1.9.0",
    "anyio>=4.7.0",
]

[project.scripts]
pi = "pi_coding_agent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_coding_agent"]
