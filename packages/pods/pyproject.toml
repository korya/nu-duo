[project]
name = "nu-pods"
version = "0.0.0"
description = "vLLM pod manager — Python port of @mariozechner/pi-pods"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = ["nu-coding-agent"]

[project.scripts]
nu-pods = "nu_pods.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nu_pods"]
