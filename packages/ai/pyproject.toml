[project]
name = "pi-ai"
version = "0.0.0"
description = "Unified multi-provider LLM streaming — Python port of @mariozechner/pi-ai"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "pydantic>=2.10.0",
    "httpx>=0.28.0",
    "anyio>=4.7.0",
    "anthropic>=0.73.0",
    "openai>=1.100.0",
    "google-genai>=1.0.0",
    "mistralai>=1.0.0",
    "boto3>=1.35.0",
    "typing-extensions>=4.12.0",
    "partial-json-parser>=0.2.1",
    "jsonschema>=4.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_ai"]
