[project]
name = "pi-mom"
version = "0.0.0"
description = "Slack bot delegating to pi agent — Python port of @mariozechner/pi-mom"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "pi-ai",
    "pi-agent-core",
    "pi-coding-agent",
    "slack-bolt>=1.21.0",
    "slack-sdk>=3.33.0",
    "docker>=7.1.0",
    "croniter>=3.0.0",
    "pydantic>=2.10.0",
]

[project.scripts]
pi-mom = "pi_mom.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_mom"]
